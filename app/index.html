<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0b8a5f">
<title>Legacy Foundry</title>
<link rel="manifest" href="/app/manifest.webmanifest">
<link rel="apple-touch-icon" href="/app/icon-192.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230c0e0d'/%3E%3Ctext x='15' y='21' font-family='sans-serif' font-size='12' font-weight='800' fill='white' text-anchor='middle'%3ELF%3C/text%3E%3Ccircle cx='25' cy='25' r='3' fill='%2310a876'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#16213e;--paper:#f7f8fb;--card:#fff;--brand:#2f4a8f;--brand2:#3a5aa8;--brandink:#21356b;--tint:#eef1f8;--text:#1c2433;--mut:#6b7385;--line:#e4e7f0;--danger:#c0392b;--blue:#2f4a8f;--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--paper);color:var(--text);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer;border:0;background:none}
input,textarea,select{font-family:inherit}
.app{max-width:540px;margin:0 auto;min-height:100%;background:var(--paper);position:relative}
.hidden{display:none!important}
/* generic */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:15px;padding:13px 18px;border-radius:13px;background:var(--brand);color:#fff;width:100%;transition:.15s}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.55}
.btn.sec{background:#fff;color:var(--text);border:1.5px solid var(--line)}
.btn.ghost{background:var(--tint);color:var(--brandink)}
.field{margin-bottom:13px}.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.inp{width:100%;font-size:16px;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--text)}
.inp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(16,168,118,.13)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px}
.muted{color:var(--mut)}.center{text-align:center}
.pill{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px;border-radius:999px;background:var(--tint);color:var(--brandink)}
/* screens */
.screen{display:none;padding:16px 16px calc(96px + var(--safe-b));animation:fade .25s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* auth */
.auth{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px calc(28px + var(--safe-b));background:radial-gradient(1000px 480px at 70% -10%,#27407d,#1a2b56 55%,#111b36)}
.auth .logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:800;font-size:20px;margin-bottom:26px}
.auth .lf{width:38px;height:38px;border-radius:11px;background:#fff;color:var(--brandink);display:grid;place-items:center;font-weight:800}
.auth h1{color:#fff;font-size:28px;line-height:1.15;margin-bottom:6px}
.auth p.sub{color:#bfded0;margin-bottom:22px}
.auth .inp{background:rgba(255,255,255,.95)}
.auth .toggle{color:#cdeede;text-align:center;margin-top:18px;font-size:14px}.auth .toggle b{color:#fff;text-decoration:underline}
.auth .status{color:#ffd2c2;font-size:13px;min-height:18px;margin-top:8px;font-weight:600}
/* top bar */
.top{position:sticky;top:0;z-index:20;background:rgba(246,247,246,.9);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line)}
.top .ttl{font-weight:800;font-size:18px}
.top .av{width:36px;height:36px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;overflow:hidden}
.top .av img{width:100%;height:100%;object-fit:cover}
/* bottom nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:540px;margin:0 auto;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 4px calc(6px + var(--safe-b))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--mut);font-size:11px;font-weight:600}
.nav button.on{color:var(--brand)}
.nav svg{width:23px;height:23px}
/* home */
.hi{font-size:22px;font-weight:800}.sub2{color:var(--mut);font-size:14px;margin-top:2px}
.goalcard{background:linear-gradient(135deg,#21356b,#2f4a8f);color:#fff;border:0;margin:14px 0}
.goalcard .lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#bde6d3}
.goalcard h3{font-size:18px;margin:4px 0 12px}
.bar{height:8px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:#fff;border-radius:99px}
.stats{display:flex;gap:18px;margin-top:12px;font-size:12px;color:#cdeede}.stats b{color:#fff;font-size:16px;display:block}
.sectt{font-weight:800;font-size:15px;margin:18px 2px 10px;display:flex;justify-content:space-between;align-items:center}
.move{display:flex;gap:12px;align-items:flex-start;padding:13px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:9px}
.move .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;display:grid;place-items:center;color:#fff;font-size:14px;margin-top:1px}
.move.done .box{background:var(--brand);border-color:var(--brand)}
.move.done .mt{text-decoration:line-through;color:var(--mut)}
.move .mt{font-size:14.5px;line-height:1.4}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scard{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff;text-align:left}
.scard .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:19px;margin-bottom:9px}
.scard h4{font-size:15px}.scard p{font-size:12px;color:var(--mut);margin-top:2px}
.scard .tag{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--brandink)}
/* chat */
.chatwrap{display:flex;flex-direction:column;height:100vh;max-width:540px;margin:0 auto}
.chathead{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:12px 14px}
.chathead .bk{font-size:20px;color:var(--text);width:30px}
.chathead .t{font-weight:800;font-size:16px}.chathead .s{font-size:11px;color:var(--mut)}
.msgs{flex:1;overflow-y:auto;padding:16px 14px 14px;display:flex;flex-direction:column;gap:10px;background:var(--paper)}
.msg{max-width:84%;padding:11px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.coach{background:#fff;border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:5px}
.msg.user{background:var(--brand);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.msg.typing{color:var(--mut);font-style:italic}
.composer{display:flex;gap:8px;padding:10px 12px calc(12px + var(--safe-b));border-top:1px solid var(--line);background:#fff}
.composer textarea{flex:1;resize:none;max-height:120px;font-size:15px;padding:11px 13px;border:1.5px solid var(--line);border-radius:14px}
.composer textarea:focus{outline:none;border-color:var(--brand)}
.composer .send{width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;flex:none}
.composer .send:disabled{opacity:.5}
/* mentor */
.mentor{border:1.5px solid var(--line);border-radius:16px;padding:15px;background:#fff;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center}
.mentor.sel{border-color:var(--brand);background:var(--tint)}
.mentor h4{font-size:16px}.mentor p{font-size:13px;color:var(--mut);margin-top:2px}
.mentor .rd{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center}
.mentor.sel .rd{border-color:var(--brand);background:var(--brand);color:#fff}
/* habit */
.habit{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:9px}
.habit .chk{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);flex:none;display:grid;place-items:center;color:#fff;font-size:16px}
.habit.done .chk{background:var(--brand);border-color:var(--brand)}
.habit .nm{flex:1;font-weight:600;font-size:14.5px}.habit .st{font-size:12px;color:var(--mut)}
/* modal/sheet */
.sheet{position:fixed;inset:0;z-index:60;background:rgba(8,16,13,.5);display:none;align-items:flex-end;justify-content:center}
.sheet.on{display:flex}
.sheetcard{background:#fff;width:100%;max-width:540px;border-radius:22px 22px 0 0;padding:20px 18px calc(20px + var(--safe-b));animation:up .25s ease}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.sheetcard h3{font-size:19px;margin-bottom:4px}
.dur{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 4px}
.dur button{flex:1;min-width:60px;padding:11px 6px;border:1.5px solid var(--line);border-radius:11px;font-weight:700;font-size:14px;background:#fff}
.dur button.sel{border-color:var(--brand);background:var(--brand);color:#fff}
.toast{position:fixed;left:50%;bottom:calc(90px + var(--safe-b));transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;z-index:80;opacity:0;transition:.25s;pointer-events:none}
.toast.on{opacity:1}
.loading{min-height:100vh;display:grid;place-items:center;color:var(--mut)}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--mut);padding:30px 10px;font-size:14px}
.listitem{padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:#fff;margin-bottom:9px}
.listitem .h{font-weight:700;font-size:14.5px;display:flex;justify-content:space-between;gap:8px}
.listitem .d{font-size:12.5px;color:var(--mut);margin-top:3px}
.banner{background:#fff4e5;border:1px solid #f0d49a;color:#8a5a12;padding:11px 13px;border-radius:12px;font-size:13px;margin-bottom:12px}
.banner a{color:var(--brandink);font-weight:700}
</style>
</head>
<body>
<div id="boot" class="loading"><div class="spin"></div></div>
<div id="root" class="app hidden"></div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/app/prompts.js"></script>
<script src="/app/app.js"></script>
</body></html>
